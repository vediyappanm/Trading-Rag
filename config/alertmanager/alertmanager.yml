global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default'

  routes:
    - match:
        severity: critical
      receiver: 'critical'
      group_wait: 5s

receivers:
  - name: 'default'
    webhook_configs:
      # Send all alerts to Logstash → Elasticsearch for RAG indexing
      - url: 'http://logstash:8081'
        send_resolved: true

  - name: 'critical'
    webhook_configs:
      - url: 'http://logstash:8081'
        send_resolved: true
