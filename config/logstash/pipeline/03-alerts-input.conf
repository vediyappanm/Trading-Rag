# Alertmanager webhook → infra-alerts index
input {
  http {
    port => 8081
    codec => json
    type => "alert"
  }
}

filter {
  if [type] == "alert" {
    # Alertmanager sends alerts as array in "alerts" field
    if [alerts] {
      split {
        field => "alerts"
      }
      mutate {
        add_field => {
          "alertname" => "%{[alerts][labels][alertname]}"
          "severity" => "%{[alerts][labels][severity]}"
          "instance" => "%{[alerts][labels][instance]}"
          "state" => "%{[alerts][status]}"
          "description" => "%{[alerts][annotations][description]}"
          "summary" => "%{[alerts][annotations][summary]}"
        }
      }
      date {
        match => [ "[alerts][startsAt]", "ISO8601" ]
        target => "@timestamp"
      }
    }
  }
}

output {
  if [type] == "alert" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "infra-alerts-%{+YYYY.MM.dd}"
      manage_template => false
    }
  }
}
