# Syslog input → infra-logs index
input {
  syslog {
    port => 5140
    type => "syslog"
  }
}

filter {
  if [type] == "syslog" {
    mutate {
      add_field => { "[log][level]" => "INFO" }
      add_field => { "[service][name]" => "syslog" }
    }

    # Map syslog severity to log level
    if [severity] == 0 or [severity] == 1 or [severity] == 2 {
      mutate { replace => { "[log][level]" => "FATAL" } }
    } else if [severity] == 3 {
      mutate { replace => { "[log][level]" => "ERROR" } }
    } else if [severity] == 4 {
      mutate { replace => { "[log][level]" => "WARN" } }
    }
  }
}

output {
  if [type] == "syslog" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "infra-logs-%{+YYYY.MM.dd}"
      manage_template => false
    }
  }
}
