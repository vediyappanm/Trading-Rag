# Filebeat / Fluent Bit input → infra-logs index
input {
  beats {
    port => 5044
    type => "log"
  }
}

filter {
  if [type] == "log" {
    # Parse JSON log messages if applicable
    if [message] =~ /^\{/ {
      json {
        source => "message"
        target => "parsed"
        skip_on_invalid_json => true
      }
    }

    # Normalize log level
    if [parsed][level] {
      mutate { add_field => { "[log][level]" => "%{[parsed][level]}" } }
    } else if [log][level] {
      # Already set by Filebeat
    } else {
      mutate { add_field => { "[log][level]" => "INFO" } }
    }

    # Uppercase log level
    mutate { uppercase => [ "[log][level]" ] }

    # Extract service name from container labels or log path
    if [container][name] {
      mutate { add_field => { "[service][name]" => "%{[container][name]}" } }
    }
  }
}

output {
  if [type] == "log" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "infra-logs-%{+YYYY.MM.dd}"
      manage_template => false
    }
  }
}
