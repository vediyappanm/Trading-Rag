# Prometheus remote_write → infra-metrics index
# Prometheus sends protobuf via HTTP POST to /api/v1/write
input {
  http {
    port => 8080
    codec => json
    type => "prometheus"
  }
}

filter {
  if [type] == "prometheus" {
    # Map Prometheus labels to ECS fields
    if [labels][instance] {
      mutate { add_field => { "[host][name]" => "%{[labels][instance]}" } }
    }
    if [labels][job] {
      mutate { add_field => { "[prometheus][job]" => "%{[labels][job]}" } }
    }
    if [labels][__name__] {
      mutate { add_field => { "[metric][name]" => "%{[labels][__name__]}" } }
    }

    # Map common Prometheus metrics to normalized fields
    if [labels][__name__] == "node_cpu_seconds_total" {
      mutate { add_field => { "[cpu][usage_pct]" => "%{[value]}" } }
    }
    if [labels][__name__] =~ /^node_memory/ {
      mutate { add_field => { "[memory][usage_pct]" => "%{[value]}" } }
    }
    if [labels][__name__] =~ /^node_filesystem/ {
      mutate { add_field => { "[disk][usage_pct]" => "%{[value]}" } }
    }
    if [labels][__name__] =~ /^node_network/ {
      if [labels][__name__] =~ /receive_bytes/ {
        mutate { add_field => { "[network][bytes_in]" => "%{[value]}" } }
      }
      if [labels][__name__] =~ /transmit_bytes/ {
        mutate { add_field => { "[network][bytes_out]" => "%{[value]}" } }
      }
    }

    # Convert numeric fields
    mutate {
      convert => {
        "[cpu][usage_pct]" => "float"
        "[memory][usage_pct]" => "float"
        "[disk][usage_pct]" => "float"
        "[network][bytes_in]" => "float"
        "[network][bytes_out]" => "float"
        "[value]" => "float"
      }
    }
  }
}

output {
  if [type] == "prometheus" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "infra-metrics-%{+YYYY.MM.dd}"
      manage_template => false
    }
  }
}
