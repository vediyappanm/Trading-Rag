services:
  trading-rag:
    build: .
    container_name: trading-rag-app
    ports:
      - "8123:8000"
    env_file:
      - .env
    restart: always
    command: ["uvicorn", "trading_rag.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
